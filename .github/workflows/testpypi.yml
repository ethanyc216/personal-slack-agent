name: Publish to TestPyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish. Leave blank to use 0.1.<workflow run number>."
        required: false
        type: string

permissions:
  contents: read

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  publish-testpypi:
    name: Build and publish to TestPyPI
    runs-on: ubuntu-latest
    needs: test
    environment: testpypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Generate package version
        id: version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$REQUESTED_VERSION" ]; then
            echo "version=$REQUESTED_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          with Path("pyproject.toml").open("rb") as pyproject:
              print(tomllib.load(pyproject)["project"]["version"])
          PY
          )"
          echo "version=${base_version%.*}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Apply package version
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          pyproject_path = Path("pyproject.toml")
          pyproject = pyproject_path.read_text(encoding="utf-8")
          updated = re.sub(
              r'(?m)^version = "[^"]+"$',
              f'version = "{os.environ["PACKAGE_VERSION"]}"',
              pyproject,
              count=1,
          )
          if updated == pyproject:
              raise SystemExit("Could not find project version in pyproject.toml")
          pyproject_path.write_text(updated, encoding="utf-8")
          PY

      - name: Install build frontend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build source and wheel distributions
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-package-distributions-${{ steps.version.outputs.version }}
          path: dist/
          if-no-files-found: error

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
